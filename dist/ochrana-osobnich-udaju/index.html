<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;background:#fff;line-height:1.7;font-size:16px}
.rt-header{background:#1e40af;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.rt-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px}
.rt-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.rt-logo-img{height:40px;max-width:160px;object-fit:contain;vertical-align:middle}
.rt-logo-text{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.5px}
.rt-nav{display:flex;gap:2px;flex-wrap:wrap;align-items:center}
.rt-nav a{color:rgba(255,255,255,.85);text-decoration:none;padding:6px 12px;border-radius:5px;font-size:14px;white-space:nowrap;transition:background .15s}
.rt-nav a:hover{background:rgba(255,255,255,.2);color:#fff}
.rt-main{max-width:860px;margin:0 auto;padding:48px 24px 64px}
.rt-main h1{font-size:2em;font-weight:700;line-height:1.3;margin:0 0 28px;color:#111}
.rt-main h2{font-size:1.4em;font-weight:600;margin:32px 0 12px;color:#111}
.rt-main h3{font-size:1.15em;font-weight:600;margin:24px 0 8px;color:#222}
.rt-main p{margin:0 0 16px}
.rt-main a{color:#1e40af}
.rt-main img{max-width:100%;height:auto;border-radius:6px;margin:8px 0;display:block}
.rt-main table{width:100%;border-collapse:collapse;margin:20px 0;font-size:.9em}
.rt-main table th{background:#1e40af;color:#fff;padding:10px 12px;text-align:left;font-weight:600}
.rt-main table td{padding:9px 12px;border-bottom:1px solid #e5e7eb}
.rt-main table tr:hover td{background:#f9fafb}
.rt-main ul,.rt-main ol{padding-left:24px;margin:0 0 16px}
.rt-main li{margin-bottom:6px}
.rt-footer{background:#111;color:#9ca3af;padding:48px 24px 32px}
.rt-footer-inner{max-width:1200px;margin:0 auto}
.rt-sitemap-accordion{border:1px solid #1f2937;border-radius:6px;overflow:hidden;margin-bottom:12px}
.rt-sitemap-accordion>summary{padding:12px 18px;cursor:pointer;font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em;list-style:none;display:flex;align-items:center;justify-content:space-between;background:#000;user-select:none}
.rt-sitemap-accordion>summary::-webkit-details-marker,.rt-sitemap-accordion>summary::marker{display:none}
.rt-sitemap-accordion>summary::after{content:'▼';font-size:9px;opacity:.5;transition:transform .2s}
.rt-sitemap-accordion[open]>summary::after{transform:rotate(180deg)}
.rt-sitemap-body{padding:16px 18px}
.rt-sitemap{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px 24px}
.rt-sitemap a{color:#9ca3af;text-decoration:none;font-size:14px;padding:3px 0;display:block;transition:color .15s}
.rt-sitemap a:hover{color:#fff}
.rt-sitemap-link{display:inline-block;margin:10px 0 0;color:rgba(255,255,255,.35);font-size:12px;text-decoration:none;transition:color .15s}
.rt-sitemap-link:hover{color:rgba(255,255,255,.8)}
.rt-copyright{margin:20px 0 0;padding-top:20px;border-top:1px solid #1f2937;font-size:13px;color:#555}
@media(max-width:768px){.rt-nav{display:none}.rt-main{padding:28px 16px 48px}.rt-sitemap{grid-template-columns:repeat(2,1fr)}}
</style>
